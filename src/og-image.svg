<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset="1" stop-color="#0b0f24"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.6">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid -->
  <g stroke="#818cf8" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M100 0 V630 M250 0 V630 M400 0 V630 M550 0 V630 M700 0 V630 M850 0 V630 M1000 0 V630 M1150 0 V630"/>
  </g>

  <!-- logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="20" fill="url(#grad)"/>
  <text x="116" y="132" font-family="sans-serif" font-size="44" font-weight="900" fill="#05060f" text-anchor="middle">✦</text>

  <text x="172" y="118" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="30" font-weight="800" fill="#e7e9f3">GenAI<tspan fill="#818cf8">Handbook</tspan></text>
  <text x="172" y="148" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" fill="#aab0c5">Free &amp; open-source · MIT</text>

  <!-- headline -->
  <text x="80" y="300" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" fill="#e7e9f3">Crack any GenAI &amp;</text>
  <text x="80" y="384" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" fill="url(#grad)">AI Engineering interview</text>

  <text x="80" y="446" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="26" fill="#aab0c5">Fundamentals → production. Diagrams, runnable code, the answers that land offers.</text>

  <!-- stat chips -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <rect x="80" y="496" width="200" height="68" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="100" y="534" font-size="30" font-weight="800" fill="url(#grad)">300+</text>
    <text x="100" y="556" font-size="15" fill="#6c7390">INTERVIEW Q&amp;A</text>

    <rect x="296" y="496" width="200" height="68" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="316" y="534" font-size="30" font-weight="800" fill="url(#grad)">12</text>
    <text x="316" y="556" font-size="15" fill="#6c7390">FULL PARTS</text>

    <rect x="512" y="496" width="240" height="68" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="532" y="534" font-size="30" font-weight="800" fill="url(#grad)">7.6k+</text>
    <text x="532" y="556" font-size="15" fill="#6c7390">LINES OF DEPTH</text>
  </g>

  <!-- decorative nodes -->
  <g opacity="0.5">
    <circle cx="1040" cy="200" r="6" fill="#22d3ee"/>
    <circle cx="1120" cy="260" r="6" fill="#818cf8"/>
    <circle cx="980" cy="300" r="6" fill="#e879f9"/>
    <circle cx="1080" cy="360" r="6" fill="#22d3ee"/>
    <circle cx="1010" cy="430" r="6" fill="#818cf8"/>
    <line x1="1040" y1="200" x2="1120" y2="260" stroke="#818cf8" stroke-opacity="0.3"/>
    <line x1="1120" y1="260" x2="1080" y2="360" stroke="#818cf8" stroke-opacity="0.3"/>
    <line x1="980" y1="300" x2="1080" y2="360" stroke="#818cf8" stroke-opacity="0.3"/>
    <line x1="980" y1="300" x2="1040" y2="200" stroke="#818cf8" stroke-opacity="0.3"/>
    <line x1="1080" y1="360" x2="1010" y2="430" stroke="#818cf8" stroke-opacity="0.3"/>
  </g>
</svg>
